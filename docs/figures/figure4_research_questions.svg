<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
<rect class="bg" width="1200" height="675"/>

<style>
  .bg { fill: #ffffff; }
  .title { font-family: Arial, Helvetica, sans-serif; font-size: 28px; font-weight: 700; fill: #111827; }
  .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 16px; fill: #4B5563; }
  .label { font-family: Arial, Helvetica, sans-serif; font-size: 15px; fill: #111827; font-weight: 600; }
  .small { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #4B5563; }
  .box { fill: #F8FAFC; stroke: #2563EB; stroke-width: 2; }
  .box2 { fill: #F0FDF4; stroke: #10B981; stroke-width: 2; }
  .box3 { fill: #FFFBEB; stroke: #F59E0B; stroke-width: 2; }
  .box4 { fill: #F5F3FF; stroke: #7C3AED; stroke-width: 2; }
  .line { stroke: #374151; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
  .dash { stroke: #9CA3AF; stroke-width: 2; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow-gray); }
  .section { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #2563EB; font-weight: 700; letter-spacing: 1px; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
  </marker>
  <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#9CA3AF"/>
  </marker>
</defs>

<text class="title" x="600" y="58" text-anchor="middle">Research Questions</text>
<text class="subtitle" x="600" y="88" text-anchor="middle">Key scientific questions guiding the project</text>
<rect class="box" x="230" y="155" width="740" height="88" rx="14" ry="14"/>
<text class="section" x="290" y="193" text-anchor="start">RQ1</text>
<text class="label" x="610" y="188" text-anchor="middle">How can reinforcement learning improve scheduling efficiency</text>
<text class="label" x="610" y="207" text-anchor="middle">in dynamic mine transportation systems?</text>
<path class="line" d="M600,243 L600,290"/>
<rect class="box2" x="230" y="300" width="740" height="88" rx="14" ry="14"/>
<text class="section" x="290" y="338" text-anchor="start">RQ2</text>
<text class="label" x="610" y="333" text-anchor="middle">How can traffic conditions be recognized continuously</text>
<text class="label" x="610" y="352" text-anchor="middle">from large-scale trajectory data?</text>
<path class="line" d="M600,388 L600,435"/>
<rect class="box3" x="230" y="445" width="740" height="88" rx="14" ry="14"/>
<text class="section" x="290" y="483" text-anchor="start">RQ3</text>
<text class="label" x="610" y="478" text-anchor="middle">How can intelligent scheduling adapt to continuously</text>
<text class="label" x="610" y="497" text-anchor="middle">changing transportation environments?</text>

</svg>