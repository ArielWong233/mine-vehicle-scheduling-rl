<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
<rect class="bg" width="1200" height="675"/>

<style>
  .bg { fill: #ffffff; }
  .title { font-family: Arial, Helvetica, sans-serif; font-size: 28px; font-weight: 700; fill: #111827; }
  .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 16px; fill: #4B5563; }
  .label { font-family: Arial, Helvetica, sans-serif; font-size: 15px; fill: #111827; font-weight: 600; }
  .small { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #4B5563; }
  .box { fill: #F8FAFC; stroke: #2563EB; stroke-width: 2; }
  .box2 { fill: #F0FDF4; stroke: #10B981; stroke-width: 2; }
  .box3 { fill: #FFFBEB; stroke: #F59E0B; stroke-width: 2; }
  .box4 { fill: #F5F3FF; stroke: #7C3AED; stroke-width: 2; }
  .line { stroke: #374151; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
  .dash { stroke: #9CA3AF; stroke-width: 2; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow-gray); }
  .section { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #2563EB; font-weight: 700; letter-spacing: 1px; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
  </marker>
  <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#9CA3AF"/>
  </marker>
</defs>

<text class="title" x="600" y="58" text-anchor="middle">System Architecture</text>
<text class="subtitle" x="600" y="88" text-anchor="middle">Conceptual architecture; implementation details intentionally omitted before publication</text>
<rect class="box" x="70" y="160" width="190" height="290" rx="14" ry="14"/>
<text class="label" x="165.0" y="205" text-anchor="middle">Data Source</text>
<text class="label" x="165.0" y="224" text-anchor="middle"></text>
<text class="label" x="165.0" y="243" text-anchor="middle">Vehicle GPS</text>
<text class="label" x="165.0" y="262" text-anchor="middle">Positioning</text>
<text class="label" x="165.0" y="281" text-anchor="middle">Traffic Records</text>
<rect class="box2" x="310" y="160" width="210" height="290" rx="14" ry="14"/>
<text class="label" x="415.0" y="205" text-anchor="middle">Traffic Perception</text>
<text class="label" x="415.0" y="224" text-anchor="middle"></text>
<text class="label" x="415.0" y="243" text-anchor="middle">Trajectory Cleaning</text>
<text class="label" x="415.0" y="262" text-anchor="middle">Spatial Matching</text>
<text class="label" x="415.0" y="281" text-anchor="middle">State Estimation</text>
<rect class="box3" x="570" y="160" width="210" height="290" rx="14" ry="14"/>
<text class="label" x="675.0" y="205" text-anchor="middle">Learning Module</text>
<text class="label" x="675.0" y="224" text-anchor="middle"></text>
<text class="label" x="675.0" y="243" text-anchor="middle">State Representation</text>
