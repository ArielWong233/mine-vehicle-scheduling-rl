<rect class="box4" x="830" y="160" width="210" height="290" rx="14" ry="14"/>
<text class="label" x="935.0" y="205" text-anchor="middle">Decision Output</text>
<text class="label" x="935.0" y="224" text-anchor="middle"></text>
<text class="label" x="935.0" y="243" text-anchor="middle">Dispatch Strategy</text>
