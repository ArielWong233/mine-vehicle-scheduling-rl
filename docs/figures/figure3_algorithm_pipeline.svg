<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
<rect class="bg" width="1200" height="675"/>

<style>
  .bg { fill: #ffffff; }
  .title { font-family: Arial, Helvetica, sans-serif; font-size: 28px; font-weight: 700; fill: #111827; }
  .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 16px; fill: #4B5563; }
  .label { font-family: Arial, Helvetica, sans-serif; font-size: 15px; fill: #111827; font-weight: 600; }
  .small { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #4B5563; }
  .box { fill: #F8FAFC; stroke: #2563EB; stroke-width: 2; }
  .box2 { fill: #F0FDF4; stroke: #10B981; stroke-width: 2; }
  .box3 { fill: #FFFBEB; stroke: #F59E0B; stroke-width: 2; }
  .box4 { fill: #F5F3FF; stroke: #7C3AED; stroke-width: 2; }
  .line { stroke: #374151; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
  .dash { stroke: #9CA3AF; stroke-width: 2; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow-gray); }
  .section { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #2563EB; font-weight: 700; letter-spacing: 1px; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
  </marker>
  <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#9CA3AF"/>
  </marker>
</defs>

<text class="title" x="600" y="58" text-anchor="middle">Algorithmic Research Pipeline</text>
<text class="subtitle" x="600" y="88" text-anchor="middle">From dynamic traffic perception to learning-based scheduling</text>
<rect class="box" x="55" y="270" width="155" height="90" rx="14" ry="14"/>
<text class="label" x="132.5" y="308" text-anchor="middle">Problem</text>
<text class="label" x="132.5" y="327" text-anchor="middle">Formulation</text>
<path class="line" d="M210,315.0 L242,315.0"/>
<rect class="box" x="250" y="270" width="155" height="90" rx="14" ry="14"/>
<text class="label" x="327.5" y="308" text-anchor="middle">Trajectory</text>
<text class="label" x="327.5" y="327" text-anchor="middle">Processing</text>
<path class="line" d="M405,315.0 L437,315.0"/>
<rect class="box2" x="445" y="270" width="155" height="90" rx="14" ry="14"/>
<text class="label" x="522.5" y="308" text-anchor="middle">Traffic State</text>
<text class="label" x="522.5" y="327" text-anchor="middle">Recognition</text>
<path class="line" d="M600,315.0 L632,315.0"/>
<rect class="box2" x="640" y="270" width="155" height="90" rx="14" ry="14"/>
<text class="label" x="717.5" y="308" text-anchor="middle">State</text>
<text class="label" x="717.5" y="327" text-anchor="middle">Representation</text>
<path class="line" d="M795,315.0 L827,315.0"/>
<rect class="box3" x="835" y="270" width="155" height="90" rx="14" ry="14"/>
<text class="label" x="912.5" y="308" text-anchor="middle">RL-based</text>
<text class="label" x="912.5" y="327" text-anchor="middle">Scheduling</text>
<path class="line" d="M990,315.0 L1022,315.0"/>
<rect class="box4" x="1030" y="270" width="155" height="90" rx="14" ry="14"/>
<text class="label" x="1107.5" y="308" text-anchor="middle">Evaluation and</text>
<text class="label" x="1107.5" y="327" text-anchor="middle">Optimization</text>
<text class="small" x="600" y="505" text-anchor="middle">Core algorithmic details are reserved for the manuscript currently under preparation.</text>

</svg>