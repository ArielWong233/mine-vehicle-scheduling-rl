<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
<rect class="bg" width="1200" height="675"/>

<style>
  .bg { fill: #ffffff; }
  .title { font-family: Arial, Helvetica, sans-serif; font-size: 28px; font-weight: 700; fill: #111827; }
  .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 16px; fill: #4B5563; }
  .label { font-family: Arial, Helvetica, sans-serif; font-size: 15px; fill: #111827; font-weight: 600; }
  .small { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #4B5563; }
  .box { fill: #F8FAFC; stroke: #2563EB; stroke-width: 2; }
  .box2 { fill: #F0FDF4; stroke: #10B981; stroke-width: 2; }
  .box3 { fill: #FFFBEB; stroke: #F59E0B; stroke-width: 2; }
  .box4 { fill: #F5F3FF; stroke: #7C3AED; stroke-width: 2; }
  .line { stroke: #374151; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
  .dash { stroke: #9CA3AF; stroke-width: 2; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow-gray); }
  .section { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #2563EB; font-weight: 700; letter-spacing: 1px; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
  </marker>
  <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#9CA3AF"/>
  </marker>
</defs>

<text class="title" x="600" y="58" text-anchor="middle">Research Map</text>
<text class="subtitle" x="600" y="88" text-anchor="middle">A unified research identity across intelligent decision-making projects</text>
<rect class="box" x="430" y="145" width="340" height="68" rx="14" ry="14"/>
<text class="label" x="600.0" y="185" text-anchor="middle">Artificial Intelligence</text>
<rect class="box3" x="430" y="255" width="340" height="68" rx="14" ry="14"/>
<text class="label" x="600.0" y="295" text-anchor="middle">Intelligent Decision Making</text>
<rect class="box2" x="430" y="365" width="340" height="68" rx="14" ry="14"/>
<text class="label" x="600.0" y="405" text-anchor="middle">Complex Dynamic Systems</text>
<rect class="box4" x="430" y="475" width="340" height="68" rx="14" ry="14"/>
<text class="label" x="600.0" y="515" text-anchor="middle">Computational Law & Trustworthy AI</text>
<path class="line" d="M600,213 L600,255"/>
<path class="line" d="M600,323 L600,365"/>
<path class="line" d="M600,433 L600,475"/>
<text class="small" x="600" y="615" text-anchor="middle">Mine transportation · Precision agriculture · Human-centered interaction · Dynamic legal systems</text>

</svg>